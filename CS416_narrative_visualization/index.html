<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
    <script src="https://d3js.org/d3.v6.js"></script>
    <script src="https://d3js.org/d3.v4.js"></script>
    <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
</head>


<body>
    <h1> Countries Ranked By Gun Death </h1>

<div id="my_dataviz">
</div>

<script>
    // set the dimensions and margins of the graph
    const margin = {top: 20, right: 30, bottom: 40, left: 100},
        width = 700 ,
        height = 400 ;
    
    // append the svg object to the body of the page
    const svg = d3.select("#my_dataviz")
      .append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
      .append("g")
        .attr("transform", `translate(${margin.left}, ${margin.top})`);
    
    // Parse the Data
    d3.csv("https://raw.githubusercontent.com/dahyunl2/CS416_Narrative_Visualization/main/country.csv").then( function(data) {
    
      // Add X axis
      const x = d3.scaleLinear()
        .domain([0, 52000])
        .range([ 0, width]);
      svg.append("g")
        .attr("transform", `translate(0, ${height})`)
        .call(d3.axisBottom(x))
        .selectAll("text")
          .attr("transform", "translate(-10,0)rotate(-45)")
          .style("text-anchor", "end");
    
      // Y axis
      const y = d3.scaleBand()
        .range([ 0, height ])
        .domain(data.map(d => d.Country))
        .padding(.1);
      svg.append("g")
        .call(d3.axisLeft(y))

    // create a tooltip
    var tooltip = d3.select("#my_dataviz")
    .append("div")
    .style("opacity", 0)
    .attr("class", "tooltip")
    .style("position", 'absolute')
    .style('text-align','center')
    .style('width','200px')
    .style('height','40px')
    .style("background-color", "white")
    .style("border", "solid")
    .style("border-width", "1px")
    .style("border-radius", "5px")


    // Three function that change the tooltip when user hover / move / leave a cell
    
      //Bars
      svg.selectAll("myRect")
        .data(data)
        .join("rect")
        .attr("x", x(0) )
        .attr("y", d => y(d.Country))
        .attr("width", d => x(d.Value))
        .attr("height", y.bandwidth())
        .attr("fill",function (d) {
            if (d.Country == 'United States') {
                return "blue"
            }
            else {
                return 'lightblue'
            }
          })
        .on('mouseover', function(event, d){
          tooltip
          .style("opacity", 1)
          .html("Country: " + d.Country+ "<br>Total Death: "+d.Value)
          .style("left", (d3.pointer(event,this)[0]+90) + "px") // It is important to put the +90: other wise the tooltip is exactly where the point is an it creates a weird effect
          .style("top", (d3.pointer(event,this)[1]+300) + "px")
            console.log(d);
        })
        .on('mouseout',function(event, d){tooltip.style('opacity',0)})
        
        //svg.select('rect').filter().attr('fill','red');
        // svg.selectAll('rect:nth-child(2)').attr('fill','red');
    })
    
</script>
</body>
</html>
