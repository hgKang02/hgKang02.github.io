<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
    <script src="https://d3js.org/d3.v6.js"></script>
    <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
</head>

<body>
    <h1> Firearm Violence By States
    <div id="button">
        <button onclick="window.location.href='https://hgKang02.github.io/CS416_narrative_visualization/';">Top 15 Countries</button>
        <button onclick="window.location.href='https://hgKang02.github.io/CS416_narrative_visualization/states.html';">Top 10 States in U.S.</button>
    </div>
    <style>
    .tooltip {
        text-wrap: normal;
        font-size: 12px;
    }
    </style>
    <div id = "my_dataviz">
<script>

// set the dimensions and margins of the graph
const margin = {top: 100, right: 0, bottom: 0, left: 0},
    width = 1000 - margin.left - margin.right,
    height = 900 - margin.top - margin.bottom,
    innerRadius = 120,
    outerRadius = Math.min(width, height) / 2;   

// append the svg object
const svg = d3.select("#my_dataviz")
  .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
  .append("g")
    .attr("transform", `translate(${width/2+margin.left}, ${height/2+margin.top})`);

d3.csv("https://raw.githubusercontent.com/hgKang02/hgKang02.github.io/master/CS416_narrative_visualization/states.csv").then( function(data) {

    var tooltip = d3.select("#my_dataviz")
    .append("div")
    .style("opacity", 0)
    .attr("class", "tooltip")
    .style("position", 'absolute')
    .style('text-align','center')
    .style('width','200px')
    .style('height','50px')
    .style("background-color", "white")
    .style("border", "solid")
    .style("border-width", "1px")
    .style("border-radius", "5px")
  // Scales
  const x = d3.scaleBand()
      .range([0, 2 * Math.PI])    // X axis goes from 0 to 2pi = all around the circle. If I stop at 1Pi, it will be around a half circle
      .align(0)                  // This does nothing
      .domain(data.map(d => d.State)); // The domain of the X axis is the list of states.
  const y = d3.scaleRadial()
      .range([innerRadius, outerRadius])   // Domain will be define later.
      .domain([0, 7000]); // Domain of Y is from 0 to the max seen in the data

  // Add the bars
  svg.append("g")
    .selectAll("path")
    .data(data)
    .join("path")
      .attr("fill", function(d) {
        if (d.State == "Texas") {
            return "red"
        } else {
            return "#69b3a2"
        }
      })
      .attr("d", d3.arc()     // imagine your doing a part of a donut plot
          .innerRadius(innerRadius)
          .outerRadius(d => y(d['Deaths']))
          .startAngle(d => x(d.State))
          .endAngle(d => x(d.State) + x.bandwidth())
          .padAngle(0.01)
          .padRadius(innerRadius))
          .on("mouseover", function(event, d) {
                tooltip.style("opacity", 1)
                .html("State: " + d.State+ "<br>Total Death: "+d.Deaths)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 20) + "px")
                console.log(d);
                    // Increase the outerRadius to make the arc larger
                    d3.select(this).attr("d", d3.arc()
                        .innerRadius(innerRadius)
                        .outerRadius(d => y(d.Deaths) + 100) // Increase the outer radius by 20
                        .startAngle(d => x(d.State))
                        .endAngle(d => x(d.State) + x.bandwidth())
                        .padAngle(0.01)
                        .padRadius(innerRadius)
                    );
                })
                .on("mouseout", function(event, d) {
                    // Restore the outerRadius to its original size
                    tooltip.style('opacity',0);
                    d3.select(this).attr("d", d3.arc()
                        .innerRadius(innerRadius)
                        .outerRadius(d => y(d.Deaths))
                        .startAngle(d => x(d.State))
                        .endAngle(d => x(d.State) + x.bandwidth())
                        .padAngle(0.01)
                        .padRadius(innerRadius)
                    );
                });

  // Add the labels
  svg.append("g")
      .selectAll("g")
      .data(data)
      .join("g")
        .attr("text-anchor", function(d) { return (x(d.State) + x.bandwidth() / 2 + Math.PI) % (2 * Math.PI) < Math.PI ? "end" : "start"; })
        .attr("transform", function(d) { return "rotate(" + ((x(d.State) + x.bandwidth() / 2) * 180 / Math.PI - 90) + ")"+"translate(" + (y(d['Deaths'])+10) + ",0)"; })
      .append("text")
        .text(function(d){return(d.State)})
        .attr("transform", function(d) { return (x(d.State) + x.bandwidth() / 2 + Math.PI) % (2 * Math.PI) < Math.PI ? "rotate(180)" : "rotate(0)"; })
        .style("font-size", "11px")
        .attr("alignment-baseline", "middle")

});


</script>
</body>
</html>
