<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://d3js.org/d3.v6.js"></script>
  <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
</head>
<body>
  <h1>Gun Violence for Texas</h1>

  <div id="button">
    <button onclick="window.location.href='https://hgKang02.github.io/CS416_narrative_visualization/';">Top 15 Countries</button>
    <button onclick="window.location.href='https://hgKang02.github.io/CS416_narrative_visualization/states.html';">U.S. States</button>
    <button onclick="window.location.href='https://hgKang02.github.io/CS416_narrative_visualization/last.html';">Texas Details</button>
  </div>

  <select id="selectButton"></select>

  <style>
    .tooltip {
      text-wrap: normal;
      font-size: 12px;
    }
  </style>

  <div id="my_dataviz"></div>

<script>
    var tooltip = d3.select("#my_dataviz")
    .append("div")
    .style("opacity", 0)
    .attr("class", "tooltip")
    .style("position", 'absolute')
    .style('text-align','center')
    .style('width','200px')
    .style('height','50px')
    .style("background-color", "white")
    .style("border", "solid")
    .style("border-width", "1px")
    .style("border-radius", "6px")


const margin = {top: 10, right: 100, bottom: 30, left: 30},
    width = 500,
    height = 550;

// append the svg object to the body of the page
const svg = d3.select("#my_dataviz")
  .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
  .append("g")
    .attr("transform",`translate(${margin.left},${margin.top})`);

//Read the data
d3.csv("https://raw.githubusercontent.com/hgKang02/hgKang02.github.io/master/CS416_narrative_visualization/last.csv").then(function(data) {

    const allGroup = ["Deaths", "Suicide", "Homicide"]

    // add the options to the button
    d3.select("#selectButton")
      .selectAll('myOptions')
     	.data(allGroup)
      .enter()
    	.append('option')
      .text(d => d) 
      .attr("value", d => d) 

    
    const x = d3.scaleLinear()
      .domain([2010, 2019])
      .range([ 0, width ]);
    svg.append("g")
      .attr("transform", `translate(0, ${height})`)
      .call(d3.axisBottom(x));

    // Add Y axis
    const y = d3.scaleLinear()
      .domain( [0,20])
      .range([ height, 0 ]);
    svg.append("g")
      .call(d3.axisLeft(y));

    const line = svg
      .append('g')
      .append("path")
        .datum(data)
        .attr("d", d3.line()
          .x(d => x(+d.Year))
          .y(d => y(+d.Deaths))
        )
        .attr("stroke", "black")
        .style("stroke-width", 4)
        .style("fill", "none")


    const dot = svg
      .selectAll('circle')
      .data(data)
      .join('circle')
        .attr("cx", d => x(+d.Year))
        .attr("cy", d => y(+d.Deaths))
        .attr("r", 7)
        .style("fill", "#69b3a2")
        .on("click", function(event, d) {
            const clickedBar = d3.select(this);
            tooltip.style("opacity", 1)
        .html("Year: " + d.Year + "<br>Rate: " + d.Deaths)
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY - 20) + "px");
    })
    .on("mouseout", function(event, d) {
      tooltip.style('opacity', 0);
    });


    function update(selectedGroup) {

        const dataFilter = data.map(function (d) {
            return { Year: +d.Year, Deaths: +d[selectedGroup] }; 
        });

        line
            .datum(dataFilter)
            .transition()
            .duration(1000)
            .attr("d", d3.line()
            .x(d => x(d.Year)) 
            .y(d => y(d.Deaths)) 
            );

        dot
            .data(dataFilter)
            .transition()
            .duration(1000)
            .attr("cx", d => x(d.Year)) 
            .attr("cy", d => y(d.Deaths)); 
    }

    
    d3.select("#selectButton").on("change", function(event, d) {
    
        let selectedOption = d3.select(this).property("value")
    
        update(selectedOption)
    })

}).catch(function(error) {
  console.log("Error loading the CSV file:", error);
});
</script>
</body>
</html>
